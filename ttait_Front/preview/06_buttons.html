<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<style>
  @font-face {
  font-family: 'Noto Sans KR';
  src: url('../fonts/NotoSansKR-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans KR',sans-serif;background:#fff;padding:24px;display:flex;flex-direction:column;gap:24px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .label{font-size:11px;font-weight:700;color:#6a6a6a;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px}

  .btn-primary{
    padding:0 24px;height:52px;border-radius:8px;
    background:#222;border:none;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:600;
    color:#fff;transition:background 0.2s,transform 0.1s;
  }
  .btn-primary:hover{background:#111}
  .btn-primary:active{transform:scale(0.98)}

  .btn-red{
    padding:0 24px;height:52px;border-radius:12px;
    background:#ff385c;border:none;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:600;
    color:#fff;transition:background 0.2s,transform 0.1s;width:100%;max-width:240px;
  }
  .btn-red:hover{background:#e00b41}
  .btn-red:active{transform:scale(0.98)}

  .btn-outline{
    padding:0 20px;height:48px;border-radius:12px;
    background:transparent;border:1px solid #c1c1c1;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:500;
    color:#222;transition:border-color 0.15s,box-shadow 0.15s;
    display:flex;align-items:center;gap:8px;
  }
  .btn-outline:hover{border-color:#222;box-shadow:rgba(0,0,0,0.08) 0px 4px 12px}

  .btn-ghost{
    padding:0 16px;height:42px;border-radius:21px;
    border:none;background:transparent;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;
    color:#222;transition:background 0.15s;
  }
  .btn-ghost:hover{background:#f2f2f2}

  .btn-circle{
    width:42px;height:42px;border-radius:50%;
    background:#f2f2f2;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:box-shadow 0.15s;flex-shrink:0;
  }
  .btn-circle:hover{box-shadow:rgba(0,0,0,0.08) 0px 4px 12px}

  .btn-search{
    width:40px;height:40px;border-radius:50%;
    background:#ff385c;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.2s,transform 0.1s;flex-shrink:0;
  }
  .btn-search:hover{background:#e00b41}
  .btn-search:active{transform:scale(0.92)}

  .btn-disabled{
    padding:0 24px;height:52px;border-radius:8px;
    background:#c1c1c1;border:none;cursor:not-allowed;
    font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:600;
    color:rgba(255,255,255,0.7);
  }
</style></head><body>

<div>
  <div class="label">Primary Dark — 로그인/제출</div>
  <div class="row">
    <button class="btn-primary">로그인</button>
    <button class="btn-primary">다음 단계 →</button>
    <button class="btn-disabled">비활성화</button>
  </div>
</div>

<div>
  <div class="label">Primary Red — 주 CTA</div>
  <div class="row">
    <button class="btn-red">신청하러 가기 →</button>
    <button class="btn-red" style="max-width:200px;height:44px;font-size:15px">공고 둘러보기 →</button>
  </div>
</div>

<div>
  <div class="label">Outline — 보조 액션</div>
  <div class="row">
    <button class="btn-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      공고 저장하기
    </button>
    <button class="btn-outline" style="color:#ff385c;border-color:#ff385c">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      추천순
    </button>
  </div>
</div>

<div>
  <div class="label">Ghost — 텍스트 버튼</div>
  <div class="row">
    <button class="btn-ghost">추천 공고</button>
    <button class="btn-ghost">비밀번호를 잊으셨나요?</button>
  </div>
</div>

<div>
  <div class="label">Circle — 아이콘 버튼</div>
  <div class="row">
    <button class="btn-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2" width="18" height="18"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <button class="btn-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2" width="18" height="18"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    <div style="position:relative">
      <button class="btn-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2" width="18" height="18"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <div style="position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:#ff385c;border:2px solid #fff"></div>
    </div>
    <button class="btn-search">
      <svg viewBox="0 0 24 24" fill="white" width="16" height="16"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
  </div>
</div>

</body></html>
