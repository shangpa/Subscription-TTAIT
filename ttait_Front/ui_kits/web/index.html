<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집구해 — UI Kit</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@font-face {
  font-family: 'Noto Sans KR';
  src: url('../../fonts/NotoSansKR-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
</style>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --rausch: #ff385c; --rausch-dark: #e00b41;
    --near-black: #222222; --gray-secondary: #6a6a6a;
    --gray-border: #c1c1c1; --gray-surface: #f2f2f2; --white: #ffffff;
    --shadow-card: rgba(0,0,0,0.02) 0px 0px 0px 1px, rgba(0,0,0,0.04) 0px 2px 6px, rgba(0,0,0,0.1) 0px 4px 8px;
    --shadow-hover: rgba(0,0,0,0.08) 0px 4px 12px;
    --font: 'Noto Sans KR', -apple-system, sans-serif;
  }
  body { font-family: var(--font); background: var(--white); color: var(--near-black); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #222; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  input[type=range]:focus { outline: none; }
  select:focus, input:focus { outline: none; }
  /* scrollbar hide */
  .no-scroll::-webkit-scrollbar { display: none; }
  .no-scroll { scrollbar-width: none; }
</style>
</head>
<body>
<div id="file-warning" style="display:none;margin:24px auto;padding:18px 20px;max-width:720px;border-radius:16px;background:#fff0f3;color:#222;font-family:'Noto Sans KR',sans-serif;line-height:1.6">
  <strong>로컬 서버로 실행해야 합니다.</strong><br>
  이 파일은 React/Babel로 JSX 파일을 불러오므로 더블클릭(file://) 실행 시 빈 화면이 날 수 있습니다.
  프로젝트 루트 폴더에서 <code>python -m http.server 8000</code> 실행 후
  <code>http://localhost:8000/ui_kits/web/index.html</code>로 접속하세요.
</div>
<div id="root"></div>
<script>
  if (location.protocol === 'file:') {
    document.getElementById('file-warning').style.display = 'block';
  }
</script>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="FilterBar.jsx"></script>
<script type="text/babel" src="ListingCard.jsx"></script>
<script type="text/babel" src="DetailPage.jsx"></script>
<script type="text/babel" src="AuthPage.jsx"></script>
<script type="text/babel" src="MyPage.jsx"></script>
<script type="text/babel" src="MapView.jsx"></script>

<script type="text/babel">
// ─── App shell — routing between 4 screens ───
const SCREENS = { main:'main', detail:'detail', auth:'auth', mypage:'mypage' };

const Footer = () => (
  <footer style={{borderTop:'1px solid rgba(0,0,0,0.08)',padding:'32px 24px',background:'#f2f2f2'}}>
    <div style={{maxWidth:1280,margin:'0 auto',display:'flex',gap:48,flexWrap:'wrap'}}>
      <div>
        <p style={{fontSize:12,fontWeight:600,color:'#222',marginBottom:12}}>서비스</p>
        {['공고 목록','추천 공고','알림 설정'].map(l=><p key={l} style={{fontSize:13,color:'#6a6a6a',marginBottom:8}}>{l}</p>)}
      </div>
      <div>
        <p style={{fontSize:12,fontWeight:600,color:'#222',marginBottom:12}}>지원</p>
        {['공급유형 안내','자격 확인','자주 묻는 질문'].map(l=><p key={l} style={{fontSize:13,color:'#6a6a6a',marginBottom:8}}>{l}</p>)}
      </div>
      <div style={{marginLeft:'auto'}}>
        <p style={{fontSize:12,color:'#6a6a6a'}}>© 2026 집구해. 공공임대주택 정보 플랫폼</p>
      </div>
    </div>
  </footer>
);

// Back button for sub-screens
const BackHeader = ({ title, onBack, onAvatarClick }) => (
  <header style={{position:'sticky',top:0,zIndex:100,background:'#fff',borderBottom:'1px solid rgba(0,0,0,0.08)',padding:'0 24px'}}>
    <div style={{maxWidth:1280,margin:'0 auto',display:'flex',alignItems:'center',gap:16,height:72}}>
      <button onClick={onBack} style={{width:40,height:40,borderRadius:'50%',background:'#f2f2f2',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <svg viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="2" width="18" height="18"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <p style={{fontSize:15,fontWeight:600,color:'#222',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{title}</p>
      <div style={{display:'flex',gap:8,flexShrink:0}}>
        {[<svg key="share" viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="2" width="18" height="18"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>,
          <svg key="heart" viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="2" width="18" height="18"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        ].map((icon,i)=>(
          <button key={i} style={{width:40,height:40,borderRadius:'50%',background:'#f2f2f2',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{icon}</button>
        ))}
      </div>
    </div>
  </header>
);

const App = () => {
  const [screen, setScreen] = React.useState(() => {
    const saved = localStorage.getItem('jgg_screen');
    return Object.values(SCREENS).includes(saved) ? saved : SCREENS.main;
  });
  const [activeCategory, setActiveCategory] = React.useState('all');
  const [currentPage, setCurrentPage] = React.useState(1);
  const [viewMode, setViewMode] = React.useState(() => localStorage.getItem('jgg_view') || 'list');

  React.useEffect(() => {
    localStorage.setItem('jgg_screen', screen);
    window.scrollTo(0, 0);
  }, [screen]);

  const go = (s) => setScreen(s);

  // ── MAIN LISTING ──────────────────────────────
  if (screen === SCREENS.main) {
    const TOTAL_PAGES = 5;
    const switchView = (m) => { setViewMode(m); localStorage.setItem('jgg_view', m); };

    const ViewToggle = () => (
      <div style={{display:'flex',alignItems:'center',gap:2,background:'#f2f2f2',borderRadius:10,padding:3}}>
        {[
          ['list', <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="14" height="14"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>, '리스트'],
          ['map',  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="14" height="14"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>, '지도'],
        ].map(([m, icon, label]) => (
          <button key={m} onClick={() => switchView(m)} style={{
            display:'flex', alignItems:'center', gap:5, padding:'6px 14px',
            borderRadius:8, border:'none', cursor:'pointer',
            fontFamily:"'Noto Sans KR',sans-serif", fontSize:13, fontWeight:600,
            background: viewMode===m ? '#fff' : 'transparent',
            color: viewMode===m ? '#222' : '#6a6a6a',
            boxShadow: viewMode===m ? 'rgba(0,0,0,0.08) 0px 1px 4px' : 'none',
            transition:'all 0.15s',
          }}>{icon}{label}</button>
        ))}
      </div>
    );

    return (
      <div>
        <Header
          onLogoClick={() => go(SCREENS.main)}
          onAvatarClick={() => go(SCREENS.mypage)}
          onBellClick={() => go(SCREENS.mypage)}
        />
        <FilterBar activeCategory={activeCategory} onCategoryChange={c => { setActiveCategory(c); setCurrentPage(1); }} />

        {/* 뷰 토글 */}
        <div style={{maxWidth:1280, margin:'0 auto', padding:'10px 24px', display:'flex', justifyContent:'flex-end'}}>
          <ViewToggle />
        </div>

        {viewMode === 'list' ? (
          <>
            <div style={{maxWidth:1280,margin:'0 auto',padding:'4px 24px 48px'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:24}}>
                {LISTING_DATA.map(item => (
                  <ListingCard key={item.id} item={item} onClick={() => go(SCREENS.detail)} />
                ))}
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4,padding:'32px 0'}}>
                <button onClick={()=>setCurrentPage(p=>Math.max(1,p-1))}
                  style={{width:40,height:40,borderRadius:'50%',border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'#222'}}
                  disabled={currentPage===1}>‹</button>
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setCurrentPage(n)}
                    style={{width:40,height:40,borderRadius:'50%',border:'none',cursor:'pointer',
                      fontFamily:"'Noto Sans KR',sans-serif",fontSize:14,fontWeight:n===currentPage?700:500,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      background:n===currentPage?'#222':'transparent',
                      color:n===currentPage?'#fff':'#222',transition:'background 0.15s'}}>
                    {n}
                  </button>
                ))}
                <button onClick={()=>setCurrentPage(p=>Math.min(TOTAL_PAGES,p+1))}
                  style={{width:40,height:40,borderRadius:'50%',border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'#222'}}
                  disabled={currentPage===TOTAL_PAGES}>›</button>
              </div>
            </div>
            <Footer />
          </>
        ) : (
          <MapView activeCategory={activeCategory} onDetailClick={() => go(SCREENS.detail)} />
        )}
      </div>
    );
  }

  // ── DETAIL ────────────────────────────────────
  if (screen === SCREENS.detail) return (
    <div>
      <BackHeader title="오산세교2 21단지 국민임대주택 예비입주자 모집공고" onBack={() => go(SCREENS.main)} />
      <DetailPage onBack={() => go(SCREENS.main)} />
      <Footer />
    </div>
  );

  // ── AUTH ──────────────────────────────────────
  if (screen === SCREENS.auth) return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <header style={{padding:'20px 24px',borderBottom:'1px solid rgba(0,0,0,0.08)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>go(SCREENS.main)}>
          <div style={{width:32,height:32,background:'#ff385c',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </div>
          <span style={{fontSize:20,fontWeight:700,color:'#ff385c',letterSpacing:'-0.3px'}}>집구해</span>
        </div>
        <button onClick={()=>go(SCREENS.main)} style={{width:36,height:36,borderRadius:'50%',border:'none',background:'#f2f2f2',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </header>
      <AuthPage onSuccess={() => go(SCREENS.main)} />
    </div>
  );

  // ── MY PAGE ───────────────────────────────────
  if (screen === SCREENS.mypage) return (
    <div>
      <header style={{background:'#fff',borderBottom:'1px solid rgba(0,0,0,0.08)',padding:'0 24px',position:'sticky',top:0,zIndex:100}}>
        <div style={{maxWidth:1280,margin:'0 auto',display:'flex',alignItems:'center',gap:16,height:72}}>
          <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>go(SCREENS.main)}>
            <div style={{width:32,height:32,background:'#ff385c',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            </div>
            <span style={{fontSize:20,fontWeight:700,color:'#ff385c',letterSpacing:'-0.3px'}}>집구해</span>
          </div>
          <div style={{display:'flex',gap:4,marginLeft:'auto'}}>
            {[['공고 목록',SCREENS.main],['추천 공고',null],['마이페이지',SCREENS.mypage]].map(([l,s])=>(
              <button key={l} onClick={()=>s&&go(s)} style={{padding:'8px 16px',borderRadius:8,border:'none',
                background:s===SCREENS.mypage?'#f2f2f2':'transparent',cursor:'pointer',
                fontFamily:"'Noto Sans KR',sans-serif",fontSize:14,fontWeight:s===SCREENS.mypage?600:500,
                color:s===SCREENS.mypage?'#222':'#6a6a6a',transition:'background 0.15s'}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      </header>
      <MyPage onCardClick={()=>go(SCREENS.detail)} />
      <Footer />
    </div>
  );

  return null;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
