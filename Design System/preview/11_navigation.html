<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<style>
  @font-face {
  font-family: 'Noto Sans KR';
  src: url('../fonts/NotoSansKR-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans KR',sans-serif;background:#f2f2f2;padding:0;display:flex;flex-direction:column;gap:16px;padding-bottom:16px}

  header{background:#fff;border-bottom:1px solid rgba(0,0,0,0.08);padding:0 16px}
  .h-inner{display:flex;align-items:center;gap:12px;height:72px}
  .logo{display:flex;align-items:center;gap:8px;text-decoration:none}
  .logo-icon{width:32px;height:32px;background:#ff385c;border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:18px;height:18px;fill:white}
  .logo-text{font-size:20px;font-weight:700;color:#ff385c;letter-spacing:-0.3px}
  .search-bar{flex:1;display:flex;align-items:center;background:#fff;
    box-shadow:rgba(0,0,0,0.02) 0px 0px 0px 1px,rgba(0,0,0,0.04) 0px 2px 6px,rgba(0,0,0,0.1) 0px 4px 8px;
    border-radius:40px;padding:0 8px 0 16px;height:48px;gap:10px}
  .search-bar input{flex:1;border:none;outline:none;font-family:'Noto Sans KR',sans-serif;
    font-size:13px;font-weight:500;color:#222;background:transparent}
  .search-bar input::placeholder{color:#6a6a6a;font-weight:400}
  .search-btn{width:34px;height:34px;border-radius:50%;background:#ff385c;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .h-actions{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
  .icon-btn{width:40px;height:40px;border-radius:50%;background:#f2f2f2;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:box-shadow 0.15s}
  .icon-btn:hover{box-shadow:rgba(0,0,0,0.08) 0px 4px 12px}
  .avatar{width:40px;height:40px;border-radius:50%;background:#222;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:rgba(0,0,0,0.02) 0px 0px 0px 1px,rgba(0,0,0,0.04) 0px 2px 6px,rgba(0,0,0,0.1) 0px 4px 8px}
  .ghost-btn{padding:0 14px;height:38px;border:none;background:transparent;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:#222;
    border-radius:19px;transition:background 0.15s;white-space:nowrap}
  .ghost-btn:hover{background:#f2f2f2}
  .notif-wrap{position:relative}
  .notif-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;
    background:#ff385c;border:2px solid #fff}

  /* Sidebar nav (My Page) */
  .sidebar-nav{background:#fff;border-radius:16px;margin:0 16px;overflow:hidden;
    box-shadow:rgba(0,0,0,0.02) 0px 0px 0px 1px,rgba(0,0,0,0.04) 0px 2px 6px,rgba(0,0,0,0.1) 0px 4px 8px}
  .profile-top{padding:20px;text-align:center;border-bottom:1px solid rgba(0,0,0,0.06)}
  .big-avatar{width:56px;height:56px;border-radius:50%;background:#222;
    display:flex;align-items:center;justify-content:center;margin:0 auto 10px;
    font-size:22px;color:#fff;font-weight:700}
  .profile-name{font-size:15px;font-weight:700;color:#222}
  .profile-id{font-size:12px;color:#6a6a6a}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;
    font-size:14px;font-weight:500;color:#6a6a6a;transition:background 0.15s,color 0.15s;
    border:none;background:transparent;width:100%;text-align:left;font-family:'Noto Sans KR',sans-serif}
  .nav-item:hover{background:#f2f2f2;color:#222}
  .nav-item.active{background:#fff0f3;color:#ff385c;font-weight:600}
  .nav-item svg{width:15px;height:15px;flex-shrink:0}
  .nav-divider{height:1px;background:rgba(0,0,0,0.06);margin:4px 0}
  .logout{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;
    font-size:14px;font-weight:500;color:#ff385c;border:none;background:transparent;
    width:100%;text-align:left;font-family:'Noto Sans KR',sans-serif;transition:background 0.15s}
  .logout:hover{background:#fff0f3}
  .logout svg{width:15px;height:15px}
</style></head><body>

<!-- Main Header -->
<header>
  <div class="h-inner">
    <a class="logo" href="#">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <span class="logo-text">집구해</span>
    </a>
    <div class="search-bar">
      <input type="text" placeholder="지역, 공급유형, 기관으로 검색" />
      <button class="search-btn">
        <svg viewBox="0 0 24 24" fill="white" width="14" height="14"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
    </div>
    <div class="h-actions">
      <button class="ghost-btn">추천 공고</button>
      <div class="notif-wrap">
        <button class="icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2" width="17" height="17"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <div class="notif-dot"></div>
      </div>
      <button class="avatar"><span style="color:#fff;font-size:13px;font-weight:600">관</span></button>
    </div>
  </div>
</header>

<!-- My Page Sidebar Nav -->
<div class="sidebar-nav">
  <div class="profile-top">
    <div class="big-avatar">관</div>
    <p class="profile-name">관리자</p>
    <p class="profile-id">@admin</p>
  </div>
  <button class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    내 프로필
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    저장한 공고
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    알림
    <span style="margin-left:auto;background:#ff385c;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px">1</span>
  </button>
  <div class="nav-divider"></div>
  <button class="logout">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    로그아웃
  </button>
</div>

</body></html>
